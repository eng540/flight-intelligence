version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: flight-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flight_intelligence
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flight-network

  # Redis for Celery
  redis:
    image: redis:7-alpine
    container_name: flight-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flight-network

  # Backend API
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: flight-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/flight_intelligence
      REDIS_URL: redis://redis:6379/0
      DEBUG: "false"
      ENVIRONMENT: production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - flight-network
    restart: unless-stopped

  # Celery Worker
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    container_name: flight-worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/flight_intelligence
      REDIS_URL: redis://redis:6379/0
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - flight-network
    restart: unless-stopped

  # Celery Beat Scheduler
  scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    container_name: flight-scheduler
    command: celery -A worker.celery_app beat -l info
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/flight_intelligence
      REDIS_URL: redis://redis:6379/0
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - flight-network
    restart: unless-stopped

  # Frontend (Nginx)
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: flight-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - flight-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  flight-network:
    driver: bridge
